# Infra compartida del VPS de Orway: Traefik + Postgres + n8n.
# Levantar: cp .env.example .env && (rellenar) && docker compose up -d
# Las apps (Ayalas, Orway, etc.) viven en apps/* y se unen a la red `web`.

networks:
  web:
    name: web

volumes:
  pg_data:
  n8n_data:
  traefik_acme:

services:
  traefik:
    # v3 (última 3.x): su cliente Docker negocia la API; v3.1 quedaba pegado en
    # 1.24 y el Docker Engine 29+ del VPS exige >= 1.40.
    image: traefik:v3
    restart: unless-stopped
    environment:
      # Docker Engine 29+ exige API >= 1.40; Traefik por defecto pide la 1.24 y el
      # daemon lo rechaza. Forzamos una versión compatible para que Traefik lea los
      # contenedores (sin esto no detecta routers ni emite certificados).
      - DOCKER_API_VERSION=1.44
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # redirige todo http -> https
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # TLS automático con Let's Encrypt (HTTP-01 por el puerto 80; más robusto que
      # TLS-ALPN en este VPS, donde el challenge ALPN fallaba con "no application
      # protocol"). Traefik sirve /.well-known/acme-challenge con prioridad sobre
      # el redirect http->https.
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    networks: [web]

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [web]
    # Sin `ports:` a propósito — Postgres NO se expone a internet.
    # Las apps lo alcanzan por la red interna con host `postgres`.

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://${N8N_HOST}/
      GENERIC_TIMEZONE: America/Mexico_City
      # Los tokens de Meta/OpenAI se cargan como Credentials DENTRO de n8n.
    volumes:
      - n8n_data:/home/node/.n8n
    networks: [web]
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.tls.certresolver=le
      - traefik.http.services.n8n.loadbalancer.server.port=5678
